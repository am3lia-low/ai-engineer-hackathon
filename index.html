<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="panel" class="hidden">
        <div id="panel-head">
          <span id="panel-mode" data-mode="idle">watching</span>
          <span id="panel-title"></span>
          <button id="panel-close" title="dismiss">×</button>
        </div>
        <div id="panel-tabs" class="hidden">
          <button class="tab active" data-tab="summary">Summary</button>
          <button class="tab" data-tab="reply">Reply</button>
          <button class="tab" data-tab="ask">Ask</button>
        </div>
        <div id="panel-body">
          <div id="panel-spinner" class="hidden">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
          <div id="panel-content"></div>
        </div>
        <div id="panel-actions" class="hidden">
          <button id="copy-btn">Copy</button>
        </div>
      </div>
      <div id="cat-wrapper" title="drag · click to refresh">
        <svg id="cat" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" aria-label="Small black cat">
          <polygon class="ear ear-left" points="115,120 152,88 165,145" fill="#161616" />
          <polygon class="ear ear-right" points="285,120 248,88 235,145" fill="#161616" />
          <ellipse class="body" cx="200" cy="225" rx="112" ry="115" fill="#161616" />
          <ellipse class="eye eye-left" cx="164" cy="212" rx="8" ry="8" fill="#f5cc57" />
          <ellipse class="eye eye-right" cx="236" cy="212" rx="8" ry="8" fill="#f5cc57" />
          <path class="tail" d="M285 280 C335 275 335 335 278 328" stroke="#161616" stroke-width="14" fill="none" stroke-linecap="round" />
        </svg>
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
