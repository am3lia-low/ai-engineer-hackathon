<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="panel" class="hidden">
        <div id="panel-head">
          <span id="panel-mode" data-mode="idle">watching</span>
          <span id="panel-title"></span>
          <button id="panel-close" title="dismiss">×</button>
        </div>
        <div id="panel-tabs" class="hidden">
          <button class="tab active" data-tab="summary">Summary</button>
          <button class="tab" data-tab="reply">Reply</button>
          <button class="tab" data-tab="ask">Ask</button>
        </div>
        <div id="panel-body">
          <div id="panel-spinner" class="hidden">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
          <div id="panel-content"></div>
        </div>
        <div id="panel-actions" class="hidden">
          <button id="copy-btn">Copy</button>
        </div>
      </div>
      <div id="cat-wrapper" title="drag · click to refresh">
        <div id="cat-stack">
          <img id="cat-awake" class="cat-sprite" src="./assets/cat_awake.png" alt="Small black cat" draggable="false" />
          <img id="cat-puddle" class="cat-sprite active" src="./assets/cat_puddle.png" alt="" draggable="false" />
        </div>
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
